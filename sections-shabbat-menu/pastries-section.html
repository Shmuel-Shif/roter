<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/shabbat-menu.css">
</head>
<body>           
        <section id="pastries" class="menu-section">
            <h2 class="section-title">מאפים</h2>
            <div class="menu-grid">
        
                <div class="menu-item">
                    <img src="../images/food-shabbat/pastry.png" alt="קרואסון שוקולד" class="item-image">
                    <div class="item-content">
                        <h3 class="item-title">קרואסון שוקולד</h3>
                        <p class="item-description">קרואסון פריך עם מילוי שוקולד מריר, חם וטעים</p>
                        <span class="item-price">₪18</span>
                    </div>
                </div>
        
                <div class="menu-item">
                    <img src="../images/food-shabbat/pastry.png" alt="מאפה קינמון" class="item-image">
                    <div class="item-content">
                        <h3 class="item-title">מאפה קינמון</h3>
                        <p class="item-description">מאפה חמאה עם סוכר וקינמון, טרי וטעים</p>
                        <span class="item-price">₪15</span>
                    </div>
                </div>
        
                <div class="menu-item">
                    <img src="../images/food-shabbat/pastry.png" alt="בייגל מלח" class="item-image">
                    <div class="item-content">
                        <h3 class="item-title">בייגל מלח</h3>
                        <p class="item-description">בייגל חם ומפנק עם מלח גס מעל</p>
                        <span class="item-price">₪10</span>
                    </div>
                </div>
        
                <div class="menu-item">
                    <img src="../images/food-shabbat/pastry.png" alt="פאי תפוחים" class="item-image">
                    <div class="item-content">
                        <h3 class="item-title">פאי תפוחים</h3>
                        <p class="item-description">פאי תפוחים חמים עם בצק פריך</p>
                        <span class="item-price">₪25</span>
                    </div>
                </div>
        
                <div class="menu-item">
                    <img src="../images/food-shabbat/pastry.png" alt="ספינג' פריזאי" class="item-image">
                    <div class="item-content">
                        <h3 class="item-title">ספינג' פריזאי</h3>
                        <p class="item-description">ספינג' פריזאי חם עם אבקת סוכר</p>
                        <span class="item-price">₪20</span>
                    </div>
                </div>
        
            </div>
        </section>

        <script src="../js/shabbat-menu.js"></script>
</body>
</html>
