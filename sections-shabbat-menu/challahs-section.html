<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

</head>
<body>    
        <section id="challahs" class="menu-section">
            <h2 class="section-title">חלות</h2>
            <div class="menu-grid">

                    <img src="../images/food-shabbat/challah.png" alt="חלה מתוקה" class="item-image">

                    </div>
                </div>
        
                <div class="menu-item">
                    <img src="../images/food-shabbat/challah.png" alt="חלה קלועה" class="item-image">

                    </div>
                </div>
        
                <div class="menu-item">
                    <img src="../images/food-shabbat/challah.png" alt="חלת זעתר" class="item-image">
                    <div class="item-content">
                        <h3 class="item-title">חלת זעתר</h3>
